name: Docker Login and Buildx Setup
description: Log in to Docker Hub and GHCR, then configure Docker Buildx

inputs:
  push:
    description: Whether to actually push (skips login when false)
    default: 'false'
    required: false
  ghcr_token:
    description: GitHub token for GHCR login
    required: false
  dockerhub_username:
    description: Docker Hub username
    required: false
  dockerhub_token:
    description: Docker Hub access token
    required: false
  setup_qemu:
    description: Whether to set up QEMU for multi-platform builds
    default: 'true'
    required: false

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      if: ${{ inputs.push == 'true' }}
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.ghcr_token }}

    - name: Log in to Docker Hub
      if: ${{ inputs.push == 'true' }}
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Set up QEMU
      if: ${{ inputs.setup_qemu == 'true' }}
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      with:
        image: tonistiigi/binfmt:master

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      with:
        buildkitd-config-inline: |
          [worker.oci]
          max-parallelism = 2

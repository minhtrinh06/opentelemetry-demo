# Test

name: CI Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  integration-tests:
    needs: unit-tests
    uses: ./.github/workflows/integration-tests.yml
    secrets: inherit

  build-dev-images:
    needs: integration-tests
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker-build.yml
    environment:
      name: development
    with:
      push: true
      version: ${{ github.sha }}
    secrets: inherit

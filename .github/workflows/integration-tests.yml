name: Integration Tests

on:
  workflow_call:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  run-integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Check affected services
        id: affected-services
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "targets=" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tests_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(docker-compose[^/]*\.yml|\.env(\.override)?|buildkitd\.toml)$'; then
            echo "Shared build configuration changed; building all services."
            echo "targets=" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tests_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          services="$(
            for service in $(echo "$changed_files" | awk -F/ '$1 == "src" { print $2 }' | sort -u); do
              case "$service" in
                accounting|ad|cart|checkout|currency|email|flagd-ui|fraud-detection|frontend|frontend-proxy|image-provider|kafka|llm|load-generator|opensearch|payment|product-catalog|product-reviews|quote|recommendation|shipping|telemetry-docs)
                  echo "$service"
                  ;;
              esac
            done | sort -u | tr '\n' ' '
          )"
          tests_changed=false
          if echo "$changed_files" | grep -Eq '^(test/tracetesting|pb)/'; then
            tests_changed=true
          fi

          if [ -z "$services" ]; then
            echo "No service source changes detected; skipping image build."
            echo "targets=" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Building affected services: $services"
            echo "targets=$services" >> "$GITHUB_OUTPUT"
            if [ "$tests_changed" = true ]; then
              echo "services=" >> "$GITHUB_OUTPUT"
            else
              echo "services=$services" >> "$GITHUB_OUTPUT"
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tests_changed=$tests_changed" >> "$GITHUB_OUTPUT"

      - name: Build images
        if: steps.affected-services.outputs.skip == 'false'
        run: |
          set -a
          . ./.env
          . ./.env.override
          set +a
          read -r -a bake_targets <<< "${{ steps.affected-services.outputs.targets }}"
          docker buildx bake \
            -f docker-compose.yml \
            --load \
            --set "*.platform=linux/amd64" \
            --set "*.cache-from=type=gha,scope=integration-${{ github.base_ref || github.ref_name }}" \
            --set "*.cache-to=type=gha,mode=max,scope=integration-${{ github.base_ref || github.ref_name }}" \
            "${bake_targets[@]}"

      - name: Build trace-based test image
        if: steps.affected-services.outputs.tests_changed == 'true'
        run: docker compose --env-file .env --env-file .env.override -f docker-compose-tests.yml build traceBasedTests

      - name: Run trace-based tests
        env:
          SERVICES_TO_TEST: ${{ steps.affected-services.outputs.services }}
        run: make run-tracetesting

      - name: Show trace-based test logs
        if: failure()
        run: |
          docker compose --env-file .env --env-file .env.override -f docker-compose-tests.yml ps
          docker compose --env-file .env --env-file .env.override -f docker-compose-tests.yml logs tracetest-server tracetest-postgres otel-collector traceBasedTests

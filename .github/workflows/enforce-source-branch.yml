name: Enforce source branch

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR is from correct source branch
        run: |
          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "staging" ]; then
            echo "PRs to 'main' must come from 'staging' branch"
            exit 1
          fi
          if [ "${{ github.base_ref }}" = "staging" ] && [ "${{ github.head_ref }}" != "development" ]; then
            echo "PRs to 'staging' must come from 'development' branch"
            exit 1
          fi

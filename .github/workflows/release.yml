name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build_and_push_images:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker-build.yml
    environment:
      name: production
    if: ${{ !github.event.repository.fork }}
    with:
      push: true
      version: ${{ github.event.release.tag_name }}
    secrets: inherit
